name: Test action copies itself and builds in workspace
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      # The action copies itself into the workspace, installs dependencies,
      # and builds TypeScript before running. Even though it fails on a
      # non-PR event, the setup steps should have produced dist/main.js.
      - id: action
        uses: .
        continue-on-error: true
        with:
          githubToken: ${{ github.token }}

      - name: Assert dist/main.js was produced by the action's build step
        run: |
          echo "Checking for dist/main.js in workspace..."
          if [ ! -f "$GITHUB_WORKSPACE/dist/main.js" ]; then
            echo "FAIL: dist/main.js not found after action ran"
            ls -la "$GITHUB_WORKSPACE/dist/" 2>/dev/null || echo "dist/ directory does not exist"
            exit 1
          fi
          echo "PASS: dist/main.js exists in workspace"

      - name: Assert run.js was copied into workspace
        run: |
          echo "Checking for run.js in workspace..."
          if [ ! -f "$GITHUB_WORKSPACE/run.js" ]; then
            echo "FAIL: run.js not found in workspace after action ran"
            exit 1
          fi
          echo "PASS: run.js exists in workspace"

      - name: Assert action outcome was failure on non-PR event
        env:
          OUTCOME: ${{ steps.action.outcome }}
        run: |
          echo "outcome: $OUTCOME"
          if [ "$OUTCOME" != "failure" ]; then
            echo "FAIL: expected action to fail on non-PR event, got outcome='$OUTCOME'"
            exit 1
          fi
          echo "PASS: action correctly failed on non-PR event (expected)"
