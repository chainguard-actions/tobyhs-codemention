name: Test codemention missing token
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    env:
      GITHUB_EVENT_NAME: pull_request
      GITHUB_REF: refs/pull/1/merge
      GITHUB_HEAD_REF: feature-branch
      GITHUB_BASE_REF: main
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - id: action
        uses: .
        continue-on-error: true
        with:
          githubToken: ""

      - name: Assert action failed with empty token
        env:
          OUTCOME: ${{ steps.action.outcome }}
        run: |
          echo "action outcome: $OUTCOME"
          if [ "$OUTCOME" != "failure" ]; then
            echo "FAIL: expected action to fail with empty token, but got outcome: $OUTCOME"
            exit 1
          fi
          echo "PASS: action correctly failed with empty/missing token"
