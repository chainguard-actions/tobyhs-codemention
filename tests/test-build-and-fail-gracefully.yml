name: Test build and graceful failure with invalid token
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      # Create a fake pull_request event payload so node run.js has something to parse
      - name: Create fake event payload
        run: |
          mkdir -p /tmp/fake-event
          cat > /tmp/fake-event/event.json <<'EOF'
          {
            "action": "opened",
            "pull_request": {
              "number": 1,
              "draft": false,
              "user": { "login": "testuser" },
              "base": { "sha": "abc123", "ref": "main" },
              "head": { "sha": "def456", "ref": "feature-branch" }
            },
            "repository": {
              "name": "testrepo",
              "owner": { "login": "testowner" }
            }
          }
          EOF

      - id: action
        uses: .
        continue-on-error: true
        with:
          githubToken: fake-invalid-token-for-testing
        env:
          GITHUB_EVENT_NAME: pull_request
          GITHUB_REF: refs/pull/1/merge
          GITHUB_HEAD_REF: feature-branch
          GITHUB_BASE_REF: main
          GITHUB_EVENT_PATH: /tmp/fake-event/event.json
          GITHUB_REPOSITORY: testowner/testrepo

      # The action should fail because the token is invalid and can't call GitHub API
      # but it should fail gracefully (not crash the runner)
      - name: Assert action failed gracefully with invalid token
        env:
          OUTCOME: ${{ steps.action.outcome }}
        run: |
          echo "action outcome: $OUTCOME"
          if [ "$OUTCOME" != "failure" ]; then
            echo "FAIL: expected action to fail with invalid token, got outcome: $OUTCOME"
            exit 1
          fi
          echo "PASS: action failed gracefully as expected with invalid token"

      # Verify the build artifacts were created (npm build succeeded)
      # Under act, github.action_path resolves to the action directory,
      # and lib/ is created inside that directory.
      - name: Assert build artifacts exist
        run: |
          # Find the lib/main.js file - it's created inside the action directory
          # Search from the workspace root for the compiled output
          FOUND=$(find "$GITHUB_WORKSPACE" -path "*/lib/main.js" -type f 2>/dev/null | head -1)
          echo "Found lib/main.js at: $FOUND"
          if [ -z "$FOUND" ]; then
            echo "FAIL: lib/main.js not found anywhere under $GITHUB_WORKSPACE - npm build may have failed"
            echo "Listing workspace contents:"
            ls -la "$GITHUB_WORKSPACE/" || true
            exit 1
          fi
          echo "PASS: build artifacts exist at $FOUND"
