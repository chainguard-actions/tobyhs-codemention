name: Test codemention basic usage
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      # Run the action with an invalid token; it should fail gracefully
      # (core.setFailed) rather than crashing the runner
      - id: action
        uses: .
        continue-on-error: true
        with:
          githubToken: fake-token-for-testing
        env:
          GITHUB_EVENT_NAME: pull_request
          GITHUB_REF: refs/pull/1/merge
          GITHUB_HEAD_REF: feature-branch
          GITHUB_BASE_REF: main

      - name: Assert action ran (not skipped)
        env:
          OUTCOME: ${{ steps.action.outcome }}
        run: |
          echo "outcome: $OUTCOME"
          # The action should fail (bad token / no real PR) but not be skipped
          # outcome should be 'failure' or 'success', never 'skipped'
          if [ "$OUTCOME" = "skipped" ]; then
            echo "FAIL: action was skipped unexpectedly"
            exit 1
          fi
          echo "PASS: action ran and produced outcome=$OUTCOME (expected failure with fake token)"
