name: Test non-PR event handling
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      # Invoke the action under a workflow_dispatch event (no pull_request payload).
      # The action should fail gracefully via core.setFailed because
      # context.payload.pull_request is undefined outside a PR event.
      - id: action
        uses: .
        continue-on-error: true
        with:
          githubToken: ${{ github.token }}

      - name: Assert action failed gracefully on non-PR event
        env:
          OUTCOME: ${{ steps.action.outcome }}
        run: |
          echo "outcome: $OUTCOME"
          if [ "$OUTCOME" != "failure" ]; then
            echo "FAIL: expected action to fail on non-PR event, got outcome='$OUTCOME'"
            exit 1
          fi
          echo "PASS: action correctly failed on non-PR event"
