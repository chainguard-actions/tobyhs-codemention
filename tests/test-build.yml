name: Test action build produces dist artifacts
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      # Invoke the action under test; it copies itself into the workspace,
      # installs dependencies, and runs "npm run build" before executing.
      # Even though it fails on a non-PR event, the build step should have
      # produced dist/main.js in the workspace.
      - id: action
        uses: .
        continue-on-error: true
        with:
          githubToken: ${{ github.token }}

      - name: Assert dist/main.js was produced by build
        run: |
          echo "Checking for dist/main.js..."
          if [ ! -f "$GITHUB_WORKSPACE/dist/main.js" ]; then
            echo "FAIL: dist/main.js not found after build"
            ls -la "$GITHUB_WORKSPACE/dist/" 2>/dev/null || echo "dist/ directory does not exist"
            exit 1
          fi
          echo "PASS: dist/main.js exists"

      - name: Assert run.js references dist/main.js
        run: |
          echo "Checking run.js content..."
          if ! grep -q "dist/main.js" "$GITHUB_WORKSPACE/run.js"; then
            echo "FAIL: run.js does not reference dist/main.js"
            cat "$GITHUB_WORKSPACE/run.js"
            exit 1
          fi
          echo "PASS: run.js correctly references dist/main.js"

      - name: Assert dist/main.js is non-empty
        run: |
          echo "Checking dist/main.js is non-empty..."
          if [ ! -s "$GITHUB_WORKSPACE/dist/main.js" ]; then
            echo "FAIL: dist/main.js is empty"
            exit 1
          fi
          echo "PASS: dist/main.js is non-empty"
