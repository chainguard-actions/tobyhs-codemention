name: Test codemention build succeeds
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    env:
      GITHUB_EVENT_NAME: pull_request
      GITHUB_REF: refs/pull/1/merge
      GITHUB_HEAD_REF: feature-branch
      GITHUB_BASE_REF: main
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - id: action
        uses: .
        continue-on-error: true
        with:
          githubToken: fake-token-for-build-test

      - name: Assert codemention-package-lock.json was copied to workspace
        run: |
          echo "Checking for codemention-package-lock.json in workspace"
          if [ ! -f "$GITHUB_WORKSPACE/codemention-package-lock.json" ]; then
            echo "FAIL: codemention-package-lock.json was not copied to workspace"
            exit 1
          fi
          echo "PASS: codemention-package-lock.json exists in workspace"

      - name: Assert action ran (build steps executed)
        env:
          OUTCOME: ${{ steps.action.outcome }}
        run: |
          echo "action outcome: $OUTCOME"
          # The action should run through the build steps and fail at node run.js
          # (API call with fake token). 'failure' is expected; 'success' would be
          # surprising but acceptable. Only 'cancelled' or empty would be wrong.
          if [ "$OUTCOME" = "success" ] || [ "$OUTCOME" = "failure" ]; then
            echo "PASS: action ran (outcome=$OUTCOME)"
          else
            echo "FAIL: unexpected outcome: $OUTCOME"
            exit 1
          fi
