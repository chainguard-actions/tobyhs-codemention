name: post-release

on:
  release:
    types:
      - released

jobs:
  update_major_version_tag:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/publish-action@23f4c6f12633a2da8f44938b71fde9afec138fb4 # v0.4.0
        with:
          source-tag: ${{ github.event.release.tag_name }}
