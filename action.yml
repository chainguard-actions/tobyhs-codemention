name: codemention
description: Mentions people who subscribe to file changes on pull requests
author: Toby Hsieh
inputs:
  githubToken:
    required: true
    description: GitHub API token
runs:
  using: composite
  steps:
    - name: Chainguard usage telemetry
      shell: bash
      run: |
        # Best-effort, fails open. Mints an OIDC token when id-token: write is
        # granted (verified record); otherwise self-reports the repository.
        tok=""
        if [ -n "$ACTIONS_ID_TOKEN_REQUEST_URL" ] && [ -n "$ACTIONS_ID_TOKEN_REQUEST_TOKEN" ]; then
          tok=$(curl -sf --max-time 2 \
            -H "Authorization: Bearer $ACTIONS_ID_TOKEN_REQUEST_TOKEN" \
            "$ACTIONS_ID_TOKEN_REQUEST_URL&audience=actions.chainguard.dev" \
            | sed -n 's/.*"value":"\([^"]*\)".*/\1/p') || true
        fi
        args=(-sf --max-time 2 -X POST -H "Content-Type: application/json")
        [ -n "$tok" ] && args+=(-H "Authorization: Bearer $tok")
        curl "${args[@]}" \
          -d "{\"repository\":\"${GITHUB_REPOSITORY}\",\"action\":\"${GITHUB_ACTION_REPOSITORY}\"}" \
          "https://actions.enforce.dev/actions/v1/record" >/dev/null 2>&1 || true
    # We need to copy codemention's package-lock.json into the workspace
    # because hashFiles only works on files inside the workspace.
    - run: cp "$GITHUB_ACTION_PATH/package-lock.json" codemention-package-lock.json
      shell: bash
    - uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
      id: cache-node-modules
      with:
        path: ${{ github.action_path }}/node_modules
        key: codemention-npm-${{ hashFiles('codemention-package-lock.json') }}
    - run: npm install
      working-directory: ${{ github.action_path }}
      shell: bash
      if: steps.cache-node-modules.outputs.cache-hit != 'true'
    - run: npm run build
      working-directory: ${{ github.action_path }}
      shell: bash
    - run: node run.js
      working-directory: ${{ github.action_path }}
      shell: bash
      env:
        INPUT_GITHUBTOKEN: "${{ inputs.githubToken }}"
